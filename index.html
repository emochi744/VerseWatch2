<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>VerseWatch — Film & Dizi Takibi</title>
  <meta name="description"
    content="İzlediğin film ve dizileri evrenlerine göre takip et. MCU, X-Men, DCEU ve daha fazlası.">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</head>

<body>

  <!-- Background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Main App Container -->
  <div id="app">

    <!-- ========== HEADER ========== -->
    <header class="app-header">
      <div class="logo" id="logo-home" style="display:flex;align-items:center;cursor:pointer">
        <img src="icon-192.png" alt="VerseWatch Logo" class="logo-img"
          style="width: 28px; height: 28px; border-radius: 6px;">
        <div class="logo-text" style="margin-left:8px;font-weight:800;letter-spacing:-0.5px">VerseWatch</div>
      </div>
      <div class="header-actions">
        <button id="search-toggle-btn" class="btn-icon" aria-label="Arama" title="Ara">🔍</button>
      </div>
    </header>

    <!-- ========== SEARCH BAR ========== -->
    <div id="search-bar" class="search-bar" role="search">
      <div class="search-input-wrap">
        <input id="search-input" type="search" class="search-input" placeholder="Film veya dizi ara..."
          autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    </div>

    <!-- ========== SEARCH RESULTS ========== -->
    <div id="search-results-container" class="search-results"></div>

    <!-- ========== VIEWS ========== -->
    <main id="main-content">

      <!-- HOME / PORTAL VIEW -->
      <section id="view-home" class="view portal-view active">
        <div class="portal-container">
          <div class="portal-hero">
            <img src="icon-512.png" alt="Big Logo" class="portal-logo"
              style="width:100px;height:100px;border-radius:24px;box-shadow:var(--shadow-glow)">
            <h1 class="portal-title" style="margin-top:20px;font-size:32px">VerseWatch</h1>
            <p class="portal-subtitle">Sinematik Evren Portalı</p>
          </div>

        </div>

        <!-- User Level & Progress -->
        <div id="user-level-container" class="user-level-card">
          <div class="level-header">
            <span id="user-rank" class="level-rank-name">Yükleniyor...</span>
            <span id="user-level-num" class="level-number">Seviye --</span>
          </div>
          <div class="level-progress-bar-bg">
            <div id="level-progress-fill" class="level-progress-bar-fill"></div>
          </div>
          <div class="level-progress-info">
            <span id="level-xp-text">-- / -- XP</span>
            <span id="level-percent">--%</span>
          </div>
        </div>

        <!-- Recently Watched Panel -->
        <div id="recent-panel" class="recent-section" style="display: none;">
          <div class="section-header" style="padding-left:0; margin-bottom:12px">
            <div class="section-title" style="font-size:16px">🕒 Son İzlediklerin</div>
          </div>
          <div id="recent-scroll" class="recent-scroll">
            <!-- Recently watched items injected here -->
          </div>
        </div>

        <div class="section-header" style="padding-left:0">
          <div class="section-title">Evrenler</div>
        </div>
        <div class="portal-grid" id="portal-grid">
          <!-- Universe cards will be injected here via JS -->
        </div>
  </div>
  </section>

  <!-- UNIVERSE / LIST VIEW -->
  <section id="view-universe-wrapper" class="view">
    <div class="universe-detail-header">
      <div class="detail-header-top">
        <button id="btn-back" class="btn-back" onclick="hideUniverseDetail()" aria-label="Geri dön"
          title="Ana sayfaya dön">‹</button>
        <div class="detail-title-wrap">
          <div id="detail-universe-name" class="detail-universe-name"></div>
          <div id="detail-universe-progress" class="detail-universe-progress"></div>
        </div>
      </div>
      <div class="detail-progress-bar">
        <div id="detail-progress-fill" class="detail-progress-bar-fill" style="width:0%"></div>
      </div>
      <div id="filter-tabs" class="filter-tabs"></div>
    </div>
    <div id="movies-grid" class="movies-grid">
      <!-- Movie cards will be injected here -->
    </div>
  </section>

  <!-- STATS VIEW -->
  <section id="view-stats" class="view stats-view">
    <div class="stats-title">📊 İstatistikler</div>
    <div class="stats-grid">
      <div class="stats-detail-card">
        <div class="big-number" id="stats-done-count" style="color: var(--accent-blue)">—</div>
        <div class="label">İzlenen</div>
      </div>
      <div class="stats-detail-card">
        <div class="big-number" id="stats-total-count" style="color: var(--accent-purple)">—</div>
        <div class="label">Toplam</div>
      </div>
    </div>

    <!-- Universe Mastery Metrics -->
    <div id="stats-mastery-container" class="mastery-section" style="margin-top: 32px; padding: 0 20px;">
      <div class="section-header" style="padding-left:0; margin-bottom:16px">
        <div class="section-title" style="font-size:16px">🏆 Evren Ustalığı</div>
      </div>
      <div id="mastery-grid" class="mastery-grid"
        style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px;">
        <!-- Mastery cards injected here -->
      </div>
    </div>
    <div class="section-header" style="padding-left:0; margin-top:32px">
      <div class="section-title">İlerleme Durumu</div>
    </div>
    <div id="stats-universe-breakdown"></div>
  </section>

  </main>

  <!-- ========== NAVIGATION ========== -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-view="home" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Portal</span>
    </div>
    <div class="nav-item" data-view="stats" id="nav-stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">İstatistik</span>
    </div>
  </nav>
  </div>

  </div>
  <!-- end #app -->

  <!-- ========== MOVIE DETAIL MODAL ========== -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Film detayı">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-backdrop-container"></div>
      <div class="modal-body">
        <div class="modal-header">
          <div id="modal-title" class="modal-title"></div>
          <div class="modal-meta">
            <span id="modal-type" class="modal-meta-item"></span>
            <span class="modal-meta-item dot">·</span>
            <span id="modal-year" class="modal-meta-item"></span>
            <span id="modal-runtime" class="modal-meta-item"></span>
            <span id="modal-rating" class="modal-rating"></span>
          </div>
        </div>
        <div id="modal-genres" class="modal-genres"></div>
        <p id="modal-overview" class="modal-overview"></p>

        <!-- Rating & Comments -->
        <div class="user-feedback-section">
          <div class="section-title"
            style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; color:var(--text-secondary)">
            Senin Puanın</div>
          <div class="rating-bar-container">
            <div class="rating-bar" id="modal-rating-stars">
              <!-- Stars will be injected here -->
            </div>
            <div id="modal-rating-value" class="rating-value-display">0.0</div>
          </div>
          <div class="comment-input-wrap">
            <textarea id="modal-comment-text" class="comment-textarea"
              placeholder="Bu yapımla ilgili notların..."></textarea>
          </div>
        </div>

        <button id="modal-watch-btn" class="btn-watch-toggle unwatched" style="margin-top:24px">
          <span>▶</span>
          <span class="toggle-text">İzledim olarak işaretle</span>
        </button>
        <br><br>
        <button id="modal-close-btn" class="btn-icon"
          style="width:100%;border-radius:var(--radius-md);height:44px;font-size:14px;color:var(--text-muted)"
          aria-label="Kapat">Kapat</button>
      </div>
    </div>
  </div>



  <script src="data.js"></script>
  <script src="tmdb.js"></script>
  <script src="app.js"></script>
</body>

</html>
