name: Ultimate APK Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Native Bubblewrap)
        run: |
          # Automatically answer 'yes' to prompts if possible, 
          # but usually Bubblewrap needs a twa-manifest.json.
          # For a quick fix, let's use the community action tag but with a more stable runner
          # OR use the direct command if we have the config.
          # Since we don't have twa-manifest.json yet, let's try to fix the existing action 
          # version or use a more stable wrapper.
          # REGRET: Let's stick to the action but use a NEWER version if available,
          # OR better: Use the 'PWABuilder/pwa-to-apk' which is official.
          # Actually, Bubblewrap CLI is best but requires config files.
          echo "Switching to official PWABuilder Action for better stability..."
          
      - name: Official PWA to APK
        uses: pwa-builder/pwa-to-apk@v1.3
        with:
          pwa-url: "https://emochi744.github.io/VerseWatch2/"
          android-package-id: "com.versewatch.app"
