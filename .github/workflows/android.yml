name: Ultimate APK Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build APK (The Real One)
        uses: sharadcodes/pwa-to-apk-action@v1.0.0
        with:
          pwa_directory: "."
